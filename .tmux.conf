# =============================================================================
# PODSTAWOWE USTAWIENIA
# =============================================================================

# Zmień klawisz prefix na Ctrl+A (opcjonalnie - wygodniejsze niż domyślne Ctrl+B)
# Jeśli wolisz Ctrl+B, po prostu zakomentuj lub usuń poniższą linię.
#set -g prefix C-a
#unbind C-b
#bind C-a send-prefix

# Przeładowanie konfiguracji bez zabijania serwera (prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Włącz obsługę myszy (przesuwanie okien, zaznaczanie, zmiana rozmiaru panelek)
set -g mouse on

# Szybsze reagowanie na klawisze (zmniejsza opóźnienie Escape)
set -sg escape-time 10

# Wyłącz rozszerzone klawisze (zapobiega konfliktom z Cmd+V na macOS)
set -g extended-keys off

# =============================================================================
# ROZWIĄZANIE PROBLEMU ZE SCHOWKIEM (macOS + MacPorts)
# =============================================================================

# Wymaga: sudo port install tmux-pasteboard
# Uruchamia każdą nową powłokę przez reattach-to-user-namespace,
# dzięki czemu pbcopy/pbpaste działają wewnątrz tmuxa.
set-option -g default-command "reattach-to-user-namespace -l $SHELL"

# =============================================================================
# TRYB KOPIOWANIA (VI STYLE) – POPRAWIA DZIAŁANIE SPAKCJI
# =============================================================================

# Ustaw tryb kopiowania na vi (klawisze jak w Vimie)
# Wtedy: spacja = rozpocznij zaznaczanie, Enter/Y = kopiuj
setw -g mode-keys vi

# Skopiuj zaznaczony tekst do schowka systemowego (macOS)
# W trybie kopiowania: zaznacz spacją, przesuń kursor, naciśnij 'y'
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# To samo dla myszy: przeciągnij myszą, puść przycisk – tekst ląduje w schowku
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# =============================================================================
# OPCJONALNE – WYGLĄD I WYDOBNOŚCI
# =============================================================================

# Pasek statusu: odświeżanie co 1 sekundę
set -g status-interval 1

# Pokaż aktywny okno z numerem, nazwą i informacją o panełach
set -g status-left "[#S] "
set -g status-right "#{?client_prefix,🔷 ,} %H:%M %d-%b-%y"

# Kolor paska (jeśli terminal to obsługuje)
set -g status-style bg=black,fg=white
set -g window-status-current-style fg=cyan,bold

# Automatyczne ponumerowanie okien od 1 (zamiast 0)
set -g base-index 1
setw -g pane-base-index 1

# Szybkie przełączanie między ostatnim oknem (prefix + Tab)
bind Tab last-window

# Szybkie przełączanie między panelem (Alt + strzałki) – przydatne na macOS
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Podział okna na panele (poziomy/pionowy) – wygodniejsze niż domyślne %
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Zmiana rozmiaru panelek za pomocą klawiszy (prefix + Ctrl+strzałki)
bind -r C-l resize-pane -L 5
bind -r C-r resize-pane -R 5
bind -r C-u resize-pane -U 3
bind -r C-d resize-pane -D 3

# =============================================================================
# KONIEC KONFIGURACJI
# =============================================================================
